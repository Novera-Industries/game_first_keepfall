name: CI

# Runs the parts of Keepfall that can be validated automatically:
#  • backend — Cloudflare Workers TypeScript: typecheck + the full Vitest suite. Runs on a clean
#    GitHub checkout, so the local "spaces in the iCloud path break vitest-pool-workers" caveat
#    does NOT apply here.
#  • unity-tests — the EditMode test suite via game-ci. Opt-in: it runs only when the repo
#    variable UNITY_TESTS_ENABLED == 'true' AND a Unity license is configured in secrets
#    (UNITY_LICENSE or UNITY_SERIAL, plus UNITY_EMAIL/UNITY_PASSWORD). Until you set that
#    variable the job is SKIPPED (neutral), not failed — so CI stays green on the backend alone.
#    Enable: Settings ▸ Secrets and variables ▸ Actions ▸ Variables → UNITY_TESTS_ENABLED=true,
#    then add the license secrets.

on:
  push:
    branches: [main, "milestone/**"]
  pull_request:
    branches: [main]

permissions:
  contents: read
  checks: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (typecheck + Vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  unity-tests:
    name: Unity EditMode tests
    runs-on: ubuntu-latest
    # Opt-in. Skipped (neutral, not failed) until you set repo variable UNITY_TESTS_ENABLED=true
    # and add the Unity license secrets — game-ci cannot run without a license.
    if: ${{ vars.UNITY_TESTS_ENABLED == 'true' }}
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: actions/cache@v4
        with:
          path: unity/Library
          key: Library-${{ hashFiles('unity/Assets/**', 'unity/Packages/**', 'unity/ProjectSettings/**') }}
          restore-keys: |
            Library-
      - uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
        with:
          projectPath: unity
          unityVersion: 2023.2.20f1
          testMode: editmode
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          artifactsPath: unity-test-results
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unity-editmode-results
          path: unity-test-results
